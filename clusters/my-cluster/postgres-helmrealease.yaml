apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "16.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  values:
    auth:
      username: fluxuser
      password: fluxpassword
      database: fluxdb
    primary:
      persistence:
        enabled: false    # disabled for kind/local testing
    resources:
      requests:
        memory: 256Mi
        cpu: 100m