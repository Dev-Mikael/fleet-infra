apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: default
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: fluxdb
      owner: fluxuser
      secret:
        name: postgres-credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: default
type: kubernetes.io/basic-auth
stringData:
  username: fluxuser
  password: fluxpassword