apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 30m
  timeout: 10m            # ← increase from default 5m
  chart:
    spec:
      chart: postgresql
      version: "16.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3          # ← retry on failure
  upgrade:
    remediation:
      retries: 3
  values:
    auth:
      username: fluxuser
      password: fluxpassword
      database: fluxdb
    primary:
      persistence:
        enabled: false
      image:
        pullPolicy: IfNotPresent   # ← don't re-pull if already cached
    resources:
      requests:
        memory: 256Mi
        cpu: 100m