apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: postgresql
      version: "15.5.38"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  install:
    createNamespace: true

  values:
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: 16.4.0-debian-12-r0   # ✅ FIXED tag (exists)

    auth:
      username: postgres
      password: postgrespassword
      database: mydb

    primary:
      persistence:
        enabled: true
        size: 8Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi