apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: postgresql
      version: "15.*"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  install:
    createNamespace: true

  values:
    auth:
      username: postgres
      password: postgrespassword
      database: mydb

    primary:
      persistence:
        enabled: true
        size: 8Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi