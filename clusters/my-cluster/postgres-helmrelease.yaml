apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 5m

  chart:
    spec:
      chart: postgresql
      version: "15.5.38"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  install:
    createNamespace: true

  values:
    ## ✅ Use stable official Postgres image
    image:
      registry: docker.io
      repository: postgres
      tag: "15"

    ## ✅ Database config
    auth:
      username: postgres
      password: postgrespassword
      database: mydb

    ## ✅ Persistence (storage)
    primary:
      persistence:
        enabled: true
        size: 8Gi

    ## ✅ Resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi