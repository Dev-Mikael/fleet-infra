apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: postgresql
      version: "16.x.x" # Use a semver range for automatic patches
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Helm Values (Refer to Bitnami chart for all options)
  values:
    auth:
      database: "my_app_db"
      username: "db_user"
      # Best Practice: Use a Kubernetes Secret for passwords instead of plain text
      existingSecret: "postgresql-credentials" 
    primary:
      persistence:
        enabled: true
        size: 8Gi