apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: default
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: postgresql
      version: "16.x.x" # Note: Bitnami 16.x.x charts generally deploy Postgres 16. Update this if you strictly need 17.
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Removed the official image override. 
    # Bitnami will now pull its own compatible image automatically.
    auth:
      username: fluxuser
      password: fluxpassword
      database: fluxdb
    primary:
      persistence:
        enabled: false
      image:
        pullPolicy: IfNotPresent
    resources:
      requests:
        memory: 256Mi
        cpu: 100m